server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Long-lived cache for hashed Astro assets (e.g. /_astro/file.abc123.js)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache static assets in /public (fonts, images, icons)
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Client-side routing fallback — required for Astro View Transitions
    # index directive here ensures /blog resolves to /blog/index.html
    # No cache on HTML so View Transitions always picks up fresh pages
    location / {
        index index.html;
        try_files $uri $uri/ $uri.html /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
